<!doctype html>
<html><head><meta charset="utf-8"><title>Product card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;color:#fff;font-family:var(--font-sans);}
  .wrap{padding:18px 22px;}
  .ttl{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#9A9A9A;margin:0 0 12px;font-weight:500;}
  .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .card{cursor:pointer;}
  .img{aspect-ratio:1.1;background:#1A1A1A;background-size:cover;background-position:center;overflow:hidden;}
  .img > div{width:100%;height:100%;background-size:cover;background-position:center;transition:transform .6s cubic-bezier(0.22,1,0.36,1);}
  .card:hover .img > div{transform:scale(1.04);}
  .name{margin:10px 0 2px;font-size:18px;font-weight:600;letter-spacing:-0.01em;}
  .tag{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.4;}
</style></head><body>
<div class="wrap">
  <p class="ttl">Product card · photo · headline · tagline · no chrome</p>
  <div class="row">
    <div class="card"><div class="img"><div style="background-image:url('../assets/lightline.png')"></div></div><div class="name">Lightline</div><div class="tag">A perfect line of light.</div></div>
    <div class="card"><div class="img"><div style="background-image:url('../assets/lightring.jpg')"></div></div><div class="name">Lightring</div><div class="tag">Capture attention with every glowing circle.</div></div>
    <div class="card"><div class="img"><div style="background-image:url('../assets/lightbar.png')"></div></div><div class="name">Lightbar</div><div class="tag">State of the art horticulture lighting.</div></div>
  </div>
</div></body></html>
