<!doctype html>
<html><head><meta charset="utf-8"><title>Hero pattern</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;font-family:var(--font-sans);}
  .hero{position:relative;height:300px;background:url('../assets/lightring.jpg') center/cover;color:#fff;overflow:hidden;}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,0.65) 100%);}
  .copy{position:absolute;left:32px;bottom:32px;z-index:2;}
  h1{font-size:48px;line-height:1.02;font-weight:700;letter-spacing:-0.03em;margin:0 0 8px;text-wrap:balance;}
  p{font-size:14px;color:rgba(255,255,255,0.85);margin:0 0 16px;max-width:38ch;}
  .pill{display:inline-block;padding:11px 24px;border:1px solid #fff;border-radius:999px;font-size:12px;color:#fff;text-decoration:none;font-weight:500;}
  .ttl{position:absolute;top:14px;left:14px;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.7);font-weight:500;z-index:2;}
</style></head><body>
<div class="hero">
  <span class="ttl">Hero · full-bleed photo + protection gradient</span>
  <div class="copy">
    <h1>Design Meets<br>Engineering</h1>
    <p>Eco-friendly architectural lighting solutions for spaces that deserve more.</p>
    <a class="pill">Let's Connect</a>
  </div>
</div></body></html>
