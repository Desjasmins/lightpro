<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;color:#0A0A0A;font-family:var(--font-sans);}
  .wrap{padding:22px 26px;}
  .ttl{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#3A3A3A;margin:0 0 14px;font-weight:500;}
  .row{display:flex;align-items:center;gap:14px;padding:5px 0;font-size:12px;}
  .lbl{width:64px;color:#9A9A9A;font-feature-settings:"tnum";font-size:11px;}
  .num{width:54px;color:#0A0A0A;font-weight:600;font-feature-settings:"tnum";}
  .bar{height:14px;background:#0A0A0A;border-radius:2px;}
</style></head><body>
<div class="wrap">
  <p class="ttl">Spacing · 8px base</p>
  <div class="row"><span class="lbl">space-1</span><span class="num">4</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="lbl">space-2</span><span class="num">8</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="lbl">space-3</span><span class="num">12</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="lbl">space-4</span><span class="num">16</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="lbl">space-5</span><span class="num">24</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="lbl">space-6</span><span class="num">32</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="lbl">space-7</span><span class="num">48</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="lbl">space-8</span><span class="num">64</span><span class="bar" style="width:64px"></span></div>
  <div class="row"><span class="lbl">space-9</span><span class="num">96</span><span class="bar" style="width:96px"></span></div>
  <div class="row"><span class="lbl">space-10</span><span class="num">128</span><span class="bar" style="width:128px"></span></div>
</div></body></html>
