<!doctype html>
<html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;color:#0A0A0A;font-family:var(--font-sans);}
  .wrap{padding:22px 26px;}
  .ttl{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#3A3A3A;margin:0 0 14px;font-weight:500;}
  .row{display:flex;align-items:baseline;gap:18px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.06);}
  .row:last-child{border:0;}
  .lbl{width:96px;font-size:11px;color:#9A9A9A;font-feature-settings:"tnum";flex-shrink:0;}
  .spec{font-weight:600;letter-spacing:-0.02em;line-height:1;}
</style></head><body>
<div class="wrap">
  <p class="ttl">Type scale · headline ladder</p>
  <div class="row"><div class="lbl">H1 · 56px</div><div class="spec" style="font-size:38px">Premium Collections</div></div>
  <div class="row"><div class="lbl">H2 · 40px</div><div class="spec" style="font-size:30px">Sectors</div></div>
  <div class="row"><div class="lbl">H3 · 32px</div><div class="spec" style="font-size:24px">Innovative Lighting</div></div>
  <div class="row"><div class="lbl">H4 · 24px</div><div class="spec" style="font-size:20px;font-weight:600">Lightbar</div></div>
</div></body></html>
