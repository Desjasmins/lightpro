<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;color:#0A0A0A;font-family:var(--font-sans);}
  .wrap{padding:22px 26px;}
  .ttl{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#3A3A3A;margin:0 0 14px;font-weight:500;}
  .row{display:flex;gap:18px;align-items:flex-end;}
  .item{text-align:left;}
  .box{width:80px;height:80px;background:#0A0A0A;}
  .pill{width:120px;height:40px;background:#0A0A0A;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;letter-spacing:0.02em;}
  .meta{margin-top:7px;font-size:11px;color:#3A3A3A;}
  .meta b{display:block;color:#0A0A0A;font-weight:600;font-size:12px;}
</style></head><body>
<div class="wrap">
  <p class="ttl">Radii · square cards or pill — no medium</p>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:0"></div><div class="meta"><b>none</b>0 · cards</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="meta"><b>sm</b>4px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="meta"><b>md</b>8px · panels</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="meta"><b>lg</b>12px · modals</div></div>
    <div class="item"><div class="pill" style="border-radius:999px">Let's Connect</div><div class="meta"><b>pill</b>999px · buttons</div></div>
  </div>
</div></body></html>
