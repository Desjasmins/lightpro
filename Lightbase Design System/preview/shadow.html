<!doctype html>
<html><head><meta charset="utf-8"><title>Shadow — flat with rare elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#F5F5F4;color:#0A0A0A;font-family:var(--font-sans);}
  .wrap{padding:24px 28px;}
  .ttl{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#3A3A3A;margin:0 0 16px;font-weight:500;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
  .card{background:#fff;border-radius:8px;padding:14px;height:90px;display:flex;flex-direction:column;justify-content:flex-end;}
  .name{font-weight:600;font-size:12px;}
  .val{font-size:10px;color:#9A9A9A;font-feature-settings:"tnum";margin-top:2px;}
</style></head><body>
<div class="wrap">
  <p class="ttl">Elevation · used sparingly · rely on photography for depth</p>
  <div class="row">
    <div class="card" style="box-shadow:none;border:1px solid rgba(0,0,0,0.06)"><div class="name">none</div><div class="val">flat (default)</div></div>
    <div class="card" style="box-shadow:0 1px 2px rgba(0,0,0,0.06)"><div class="name">shadow-1</div><div class="val">subtle hairline</div></div>
    <div class="card" style="box-shadow:0 6px 16px rgba(0,0,0,0.10)"><div class="name">shadow-2</div><div class="val">card hover</div></div>
    <div class="card" style="box-shadow:0 24px 60px rgba(0,0,0,0.18)"><div class="name">shadow-3</div><div class="val">modal / popover</div></div>
  </div>
</div></body></html>
