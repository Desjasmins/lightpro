<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Brand Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:20px 24px;}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
  .sw{aspect-ratio:1;border-radius:var(--radius-md);position:relative;border:1px solid var(--hairline-on-light);}
  .meta{margin-top:6px;font-size:11px;line-height:1.3;color:var(--lb-ink-3);}
  .meta b{display:block;font-weight:600;color:var(--lb-ink);font-size:12px;letter-spacing:-0.01em;}
  .ttl{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--lb-ink-3);margin:0 0 12px;font-weight:500;}
</style></head>
<body>
<div class="wrap">
  <p class="ttl">Brand neutrals · monochrome ladder</p>
  <div class="row">
    <div><div class="sw" style="background:#000"></div><div class="meta"><b>Black</b>#000000</div></div>
    <div><div class="sw" style="background:#0A0A0A"></div><div class="meta"><b>Ink</b>#0A0A0A</div></div>
    <div><div class="sw" style="background:#1A1A1A"></div><div class="meta"><b>Ink 2</b>#1A1A1A</div></div>
    <div><div class="sw" style="background:#2A2A2A"></div><div class="meta"><b>Ink 3</b>#2A2A2A</div></div>
    <div><div class="sw" style="background:#3A3A3A"></div><div class="meta"><b>Ink 4</b>#3A3A3A</div></div>
    <div><div class="sw" style="background:#9A9A9A"></div><div class="meta"><b>Fog</b>#9A9A9A</div></div>
    <div><div class="sw" style="background:#C8C8C6"></div><div class="meta"><b>Mist</b>#C8C8C6</div></div>
    <div><div class="sw" style="background:#D4D4D2"></div><div class="meta"><b>Cloud</b>#D4D4D2</div></div>
    <div><div class="sw" style="background:#F5F5F4"></div><div class="meta"><b>Paper</b>#F5F5F4</div></div>
    <div><div class="sw" style="background:#FAFAF8"></div><div class="meta"><b>Bone</b>#FAFAF8</div></div>
    <div><div class="sw" style="background:#FFFFFF"></div><div class="meta"><b>White</b>#FFFFFF</div></div>
    <div><div class="sw" style="background:#fff;border:1px dashed #aaa"></div><div class="meta"><b>—</b>11 steps</div></div>
  </div>
</div>
</body></html>
