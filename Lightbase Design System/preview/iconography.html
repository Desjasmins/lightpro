<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:1fr 1fr;}
  .panel{padding:24px 26px;}
  .dark{background:#000;color:#fff;}
  .light{background:#F5F5F4;color:#0A0A0A;}
  .ttl{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;font-weight:500;margin:0 0 14px;}
  .dark .ttl{color:#9A9A9A;} .light .ttl{color:#3A3A3A;}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .icon{width:40px;height:40px;display:grid;place-items:center;border-radius:999px;border:1px solid currentColor;}
  .dark .icon{border-color:rgba(255,255,255,0.6);}
  .light .icon{border-color:rgba(0,0,0,0.6);}
  small{font-size:10px;opacity:.55;display:block;margin-top:10px;}
  svg{width:22px;height:22px;}
</style></head><body>
<div class="grid">
  <div class="panel dark">
    <p class="ttl">Native · carousel chevrons</p>
    <div class="row">
      <div class="icon"><svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.5 12.5 15 20l7.5 7.5"/></svg></div>
      <div class="icon"><svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 12.5 25 20l-7.5 7.5"/></svg></div>
    </div>
    <small>only 2 native icons · 2px stroke · rounded caps</small>
  </div>
  <div class="panel light">
    <p class="ttl">Substituted · Lucide for UI</p>
    <div class="row">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6 19 19M5 19l1.4-1.4M17.6 6.4 19 5"/></svg></div>
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></div>
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v16l7-4z"/></svg></div>
    </div>
    <small>match: 2px · rounded · stroke-only · flagged substitution</small>
  </div>
</div></body></html>
