<!doctype html>
<html><head><meta charset="utf-8"><title>Imagery</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;color:#fff;font-family:var(--font-sans);}
  .wrap{padding:18px 20px;}
  .ttl{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#9A9A9A;margin:0 0 12px;font-weight:500;}
  .grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:8px;}
  .img{aspect-ratio:1;background-size:cover;background-position:center;}
  .wide{aspect-ratio:1.5;}
  .cap{font-size:10px;color:rgba(255,255,255,0.55);margin-top:6px;letter-spacing:0.06em;text-transform:uppercase;}
</style></head><body>
<div class="wrap">
  <p class="ttl">Imagery · warm-neutral · architectural · naturalistic</p>
  <div class="grid">
    <div><div class="img wide" style="background-image:url('../assets/lightring.jpg')"></div><div class="cap">Lightring · interior</div></div>
    <div><div class="img" style="background-image:url('../assets/lightcell.jpg')"></div><div class="cap">Lightcell</div></div>
    <div><div class="img" style="background-image:url('../assets/sector-residential.jpg')"></div><div class="cap">Residential</div></div>
    <div><div class="img" style="background-image:url('../assets/sector-industrial.jpg')"></div><div class="cap">Industrial</div></div>
  </div>
</div></body></html>
